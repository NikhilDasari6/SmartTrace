services:
  # Backend Service
  - type: web
    name: smarttrace-backend
    runtime: docker
    env: docker
    repo: https://github.com/NikhilDasari6/SmartTrace # Update with your username if different
    rootDir: SmartTrace-backend
    plan: free
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_SSL
        value: "true"
      - key: PORT
        value: "3000"

  # Frontend Service
  - type: web
    name: smarttrace-frontend
    runtime: docker
    env: docker
    repo: https://github.com/NikhilDasari6/SmartTrace
    rootDir: SmartTrace-frontend
    plan: free
    # If the frontend needs to talk to the backend on a different domain,
    # you might need to hardcode the URL in script.js or use a rewrite rule.
